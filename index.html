<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Health Briefing</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e5e5e5;
    --accent: #2563eb;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 18px 80px;
    min-height: 100vh;
  }
  header.top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }
  header.top h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
  }
  header.top .date {
    font-size: 13px;
    color: var(--muted);
  }
  .gear {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--muted);
    padding: 4px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
  }
  .statuses {
    display: flex;
    justify-content: space-around;
    text-align: center;
    margin-bottom: 8px;
  }
  .status {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .dot {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #ddd;
    transition: background 0.3s;
  }
  .dot.green { background: var(--green); }
  .dot.yellow { background: var(--yellow); }
  .dot.red { background: var(--red); }
  .status span {
    font-size: 12px;
    color: var(--muted);
  }
  .brief-text {
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .skeleton {
    color: var(--muted);
    font-size: 14px;
  }
  .question-box {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .question-box p {
    font-size: 14px;
    font-weight: 500;
    margin: 0 0 8px;
  }
  textarea, input[type=text], input[type=number], input[type=password], select {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    color: var(--text);
  }
  textarea { min-height: 64px; resize: vertical; }
  button.primary {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
  }
  button.primary:disabled { opacity: 0.5; cursor: default; }
  button.secondary {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  .details-toggle {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    padding: 4px 0;
  }
  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
    font-size: 13px;
  }
  .details-grid .item {
    background: var(--bg);
    border-radius: 10px;
    padding: 10px;
  }
  .details-grid .item .k { color: var(--muted); font-size: 11px; }
  .details-grid .item .v { font-weight: 600; margin-top: 2px; }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .modal {
    background: var(--card);
    width: 100%;
    max-width: 480px;
    border-radius: 18px 18px 0 0;
    padding: 22px 18px 28px;
    max-height: 88vh;
    overflow-y: auto;
  }
  .modal h2 { margin: 0 0 4px; font-size: 18px; }
  .modal .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .hidden { display: none !important; }
  .error-msg {
    color: var(--red);
    font-size: 13px;
    margin-top: 8px;
  }
  .saved-msg {
    color: var(--green);
    font-size: 13px;
    margin-top: 8px;
  }
  .segmented {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 18px;
  }
  .segmented button {
    flex: 1;
    border: none;
    background: none;
    padding: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
  }
  .segmented button.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .mood-scale {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }
  .mood-btn {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    cursor: pointer;
    font-size: 15px;
  }
  .mood-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .movement-options {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }
  .movement-btn {
    flex: 1;
    padding: 9px 0;
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
  }
  .movement-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div>
      <h1 id="greeting">Привіт</h1>
      <div class="date" id="today-date"></div>
    </div>
    <button class="gear" id="settings-btn" title="Налаштування">&#9881;</button>
  </header>

  <div class="segmented">
    <button class="active" id="tab-morning">Ранок</button>
    <button id="tab-evening">Вечір</button>
  </div>

  <div id="morning-view">
  <div class="card">
    <div class="statuses">
      <div class="status">
        <div class="dot" id="dot-sleep"></div>
        <span>Сон</span>
      </div>
      <div class="status">
        <div class="dot" id="dot-recovery"></div>
        <span>Відновлення</span>
      </div>
      <div class="status">
        <div class="dot" id="dot-readiness"></div>
        <span>Готовність</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div id="brief-text" class="brief-text skeleton">Аналізую дані...</div>
    <div id="question-box" class="question-box hidden">
      <p id="question-text"></p>
      <textarea id="question-answer" placeholder="Напиши, що сталось..."></textarea>
      <button class="primary" id="answer-submit">Врахувати відповідь</button>
    </div>
  </div>

  <button class="details-toggle" id="details-toggle">Детальніше ▾</button>
  <div class="card hidden" id="details-card">
    <div class="details-grid" id="details-grid"></div>
  </div>

  <div class="card">
    <div class="chips" id="context-chips">
      <div class="chip" data-tag="Тривога вночі">Тривога вночі</div>
      <div class="chip" data-tag="Важкий робочий день">Важкий робочий день</div>
      <div class="chip" data-tag="OPFOR виїзд">OPFOR виїзд</div>
    </div>
    <textarea id="context-note" placeholder="Додаткова нотатка (необов'язково)"></textarea>
    <button class="primary" id="save-context-btn">Зберегти контекст</button>
    <div id="context-msg"></div>
  </div>
  </div>

  <div id="evening-view" class="hidden">
    <div class="card">
      <div class="field">
        <label>Як пройшов день емоційно?</label>
        <div class="mood-scale" id="mood-scale">
          <div class="mood-btn" data-mood="1">1</div>
          <div class="mood-btn" data-mood="2">2</div>
          <div class="mood-btn" data-mood="3">3</div>
          <div class="mood-btn" data-mood="4">4</div>
          <div class="mood-btn" data-mood="5">5</div>
        </div>
        <textarea id="evening-mood-note" placeholder="Коротко чому (необов'язково)"></textarea>
      </div>
      <div class="field">
        <label>Що було найважчим сьогодні?</label>
        <textarea id="evening-hardest" placeholder="..."></textarea>
      </div>
      <div class="field">
        <label>Чи рухався сьогодні?</label>
        <div class="movement-options" id="movement-options">
          <div class="movement-btn" data-movement="Так">Так</div>
          <div class="movement-btn" data-movement="Трохи">Трохи</div>
          <div class="movement-btn" data-movement="Ні">Ні</div>
        </div>
      </div>
      <div class="field">
        <label>Що хочеш від завтра?</label>
        <textarea id="evening-tomorrow" placeholder="..."></textarea>
      </div>
      <button class="primary" id="save-evening-btn">Зберегти вечір</button>
      <div id="evening-msg"></div>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="onboarding">
  <div class="modal">
    <h2>Налаштування</h2>
    <div class="sub">Потрібно один раз — зберігається лише в цьому браузері.</div>

    <div class="field">
      <label>Ім'я</label>
      <input type="text" id="f-name" placeholder="Юрій">
    </div>
    <div class="field">
      <label>Тип роботи</label>
      <select id="f-worktype">
        <option value="сидяча">Сидяча</option>
        <option value="активна">Активна</option>
      </select>
    </div>
    <div class="field">
      <label>Вік</label>
      <input type="number" id="f-age" placeholder="30">
    </div>
    <div class="field">
      <label>Ціль</label>
      <select id="f-goal">
        <option value="здоров'я">Здоров'я</option>
        <option value="схуднення">Схуднення</option>
        <option value="спорт">Спорт</option>
      </select>
    </div>

    <div class="field">
      <label>Anthropic API key</label>
      <input type="password" id="f-anthropic" placeholder="sk-ant-...">
    </div>
    <div class="field">
      <label>OpenWeatherMap API key</label>
      <input type="password" id="f-weather" placeholder="...">
    </div>

    <button class="primary" id="save-onboarding-btn">Зберегти і продовжити</button>
    <div id="onboarding-error" class="error-msg"></div>
  </div>
</div>

<script>
(function () {
  "use strict";

  const KYIV_LAT = 50.4501;
  const KYIV_LON = 30.5234;
  const STORAGE_KEY = "healthbrief_config_v1";
  const MODEL = "claude-sonnet-4-6";
  // URL Netlify-функції, що проксіює Notion (тримає NOTION_TOKEN на сервері).
  const NOTION_PROXY_URL = "https://fascinating-puppy-c11d90.netlify.app/.netlify/functions/notion";

  function loadConfig() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    } catch (e) {
      return null;
    }
  }

  function saveConfig(cfg) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
  }

  let config = loadConfig();

  function el(id) { return document.getElementById(id); }

  function showOnboarding(prefill) {
    prefill = prefill || {};
    el("f-name").value = prefill.name || "";
    el("f-worktype").value = prefill.workType || "сидяча";
    el("f-age").value = prefill.age || "";
    el("f-goal").value = prefill.goal || "здоров'я";
    el("f-anthropic").value = prefill.anthropicKey || "";
    el("f-weather").value = prefill.weatherKey || "";
    el("onboarding").classList.remove("hidden");
  }

  function hideOnboarding() {
    el("onboarding").classList.add("hidden");
  }

  el("save-onboarding-btn").addEventListener("click", function () {
    const name = el("f-name").value.trim();
    const anthropicKey = el("f-anthropic").value.trim();
    const weatherKey = el("f-weather").value.trim();

    if (!name || !anthropicKey || !weatherKey) {
      el("onboarding-error").textContent = "Заповни всі поля, будь ласка.";
      return;
    }

    config = {
      name: name,
      workType: el("f-worktype").value,
      age: el("f-age").value,
      goal: el("f-goal").value,
      anthropicKey: anthropicKey,
      weatherKey: weatherKey
    };
    saveConfig(config);
    hideOnboarding();
    init();
  });

  el("settings-btn").addEventListener("click", function () {
    showOnboarding(config || {});
  });

  // ---------- Перемикач Ранок / Вечір ----------

  el("tab-morning").addEventListener("click", function () {
    el("tab-morning").classList.add("active");
    el("tab-evening").classList.remove("active");
    el("morning-view").classList.remove("hidden");
    el("evening-view").classList.add("hidden");
  });

  el("tab-evening").addEventListener("click", function () {
    el("tab-evening").classList.add("active");
    el("tab-morning").classList.remove("active");
    el("evening-view").classList.remove("hidden");
    el("morning-view").classList.add("hidden");
  });

  // ---------- Weather ----------

  async function getCurrentWeather(apiKey) {
    const url = "https://api.openweathermap.org/data/2.5/weather?lat=" + KYIV_LAT +
      "&lon=" + KYIV_LON + "&appid=" + encodeURIComponent(apiKey) + "&units=metric&lang=ua";
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("OpenWeatherMap: " + resp.status);
    const data = await resp.json();
    return {
      temp: data.main && data.main.temp,
      feels_like: data.main && data.main.feels_like,
      condition: data.weather && data.weather[0] && data.weather[0].description,
      humidity: data.main && data.main.humidity
    };
  }

  // Історія (вчора 22:00) доступна лише на платному One Call 3.0 —
  // якщо ключ не має підписки, тихо пропускаємо і використовуємо тільки поточну погоду.
  async function getYesterdayEveningWeather(apiKey) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    yesterday.setHours(22, 0, 0, 0);
    const dt = Math.floor(yesterday.getTime() / 1000);
    const url = "https://api.openweathermap.org/data/3.0/onecall/timemachine?lat=" + KYIV_LAT +
      "&lon=" + KYIV_LON + "&dt=" + dt + "&appid=" + encodeURIComponent(apiKey) + "&units=metric&lang=ua";
    try {
      const resp = await fetch(url);
      if (!resp.ok) return null;
      const data = await resp.json();
      const point = data.data && data.data[0];
      if (!point) return null;
      return {
        temp: point.temp,
        condition: point.weather && point.weather[0] && point.weather[0].description
      };
    } catch (e) {
      return null;
    }
  }

  // ---------- Anthropic ----------

  async function callClaude(cfg, systemPrompt, userMessage) {
    const body = {
      model: MODEL,
      max_tokens: 1024,
      system: systemPrompt,
      messages: [{ role: "user", content: userMessage }]
    };

    const headers = {
      "content-type": "application/json",
      "x-api-key": cfg.anthropicKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    };

    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: headers,
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      const text = await resp.text();
      throw new Error("Anthropic API " + resp.status + ": " + text.slice(0, 300));
    }

    const data = await resp.json();
    const textBlocks = (data.content || []).filter(function (b) { return b.type === "text"; });
    return textBlocks.map(function (b) { return b.text; }).join("\n").trim();
  }

  function extractJson(text) {
    try {
      return JSON.parse(text);
    } catch (e) {
      const match = text.match(/\{[\s\S]*\}/);
      if (match) {
        return JSON.parse(match[0]);
      }
      throw e;
    }
  }

  // ---------- Notion (через Netlify-проксі, токен лишається на сервері) ----------

  // Повертає останні до 3 рядків (сьогодні + попередні дні) — потрібно для
  // тренду стресу і вчорашніх вечірніх нотаток.
  async function fetchRecentNotionRows() {
    const resp = await fetch(NOTION_PROXY_URL);
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error("Notion proxy " + resp.status + ": " + text.slice(0, 300));
    }
    const data = await resp.json();
    return data.rows || [];
  }

  async function saveContextToNotion(contextText) {
    const resp = await fetch(NOTION_PROXY_URL, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ type: "context", contextText: contextText })
    });
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error("Notion proxy " + resp.status + ": " + text.slice(0, 300));
    }
  }

  async function saveEveningToNotion(payload) {
    const resp = await fetch(NOTION_PROXY_URL, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(Object.assign({ type: "evening" }, payload))
    });
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error("Notion proxy " + resp.status + ": " + text.slice(0, 300));
    }
  }

  // ---------- Основний брифінг ----------

  const STATUS_COLORS = ["green", "yellow", "red"];

  function setDot(id, color) {
    const node = el(id);
    STATUS_COLORS.forEach(function (c) { node.classList.remove(c); });
    if (STATUS_COLORS.indexOf(color) !== -1) {
      node.classList.add(color);
    }
  }

  function renderDetails(row) {
    const items = [
      ["Сон (год)", row.sleep_hours],
      ["Sleep score", row.sleep_score],
      ["HRV avg", row.hrv_avg],
      ["HRV status", row.hrv_status],
      ["Body Battery", (row.body_battery_low != null && row.body_battery_high != null)
        ? (row.body_battery_low + "–" + row.body_battery_high) : null],
      ["Пульс спокою", row.resting_hr],
      ["Глибокий сон, хв", row.deep_sleep_min],
      ["REM сон, хв", row.rem_sleep_min],
      ["Легкий сон, хв", row.light_sleep_min],
      ["SpO2 avg", row.spo2_avg],
      ["SpO2 low", row.spo2_low],
      ["Стрес", row.stress_avg],
      ["Тренування", row.activities || "—"]
    ];
    const grid = el("details-grid");
    grid.innerHTML = "";
    items.forEach(function (pair) {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = '<div class="k">' + pair[0] + '</div><div class="v">' +
        (pair[1] != null && pair[1] !== "" ? pair[1] : "—") + "</div>";
      grid.appendChild(div);
    });
  }

  let lastRow = null;
  let lastWeather = null;
  let lastBrief = null;
  let lastRecentRows = [];
  let lastYesterdayRow = null;

  function briefSystemPrompt(cfg) {
    return "Ти персональний health-тренер користувача на ім'я " + cfg.name + ". " +
      "Говориш українською на 'ти', коротко і по суті, без медичного жаргону і без вибачень. " +
      "Користувач: вік " + (cfg.age || "невідомий") + ", тип роботи — " + cfg.workType +
      ", ціль — " + cfg.goal + ". " +
      "Враховуй погоду і тип роботи, коли даєш пораду. " +
      "Стрес (stress_avg) інтерпретуй так: <25 — низький, все добре; 25-50 — середній, це норма; " +
      "50+ — підвищений, обов'язково згадай це в пораді. " +
      "Якщо в даних передано elevated_stress_streak: true — це означає підвищений стрес (50+) " +
      "два або більше днів поспіль; в такому разі ОБОВ'ЯЗКОВО окремо наголоси в summary, що " +
      "кілька днів поспіль підвищений стрес і сьогодні важливо не додавати навантаження. " +
      "Якщо передано yesterday_evening_note або yesterday_tomorrow_intention — врахуй їх у " +
      "пораді (наприклад, якщо вчора користувач писав що було важко на роботі, порадь не " +
      "перевантажувати себе додатково сьогодні). " +
      "Відповідай ЛИШЕ JSON без жодного тексту навколо у форматі: " +
      '{"sleep_status": "green|yellow|red", "recovery_status": "green|yellow|red", ' +
      '"readiness_status": "green|yellow|red", "summary": "один абзац: що відбувається з тілом, ' +
      'чому (з урахуванням погоди), і одна конкретна порада на сьогодні", ' +
      '"clarifying_question": "питання, якщо якийсь показник аномальний, інакше null"}';
  }

  // Підвищений стрес (50+) два або більше дні поспіль, починаючи з найсвіжішого рядка.
  function hasElevatedStressStreak(rows) {
    let streak = 0;
    for (let i = 0; i < rows.length; i++) {
      if (rows[i].stress_avg != null && rows[i].stress_avg >= 50) {
        streak++;
      } else {
        break;
      }
    }
    return streak >= 2;
  }

  function buildUserMessage(row, weather, recentRows, yesterdayRow, extraContext) {
    let msg = "Дані Garmin за останній день:\n" + JSON.stringify(row) + "\n\n" +
      "Погода в Києві зараз:\n" + JSON.stringify(weather.current) + "\n";
    if (weather.yesterdayEvening) {
      msg += "Погода вчора о 22:00:\n" + JSON.stringify(weather.yesterdayEvening) + "\n";
    }
    if (recentRows && recentRows.length) {
      msg += "\nІсторія стресу (останні дні, найсвіжіший перший):\n" +
        JSON.stringify(recentRows.map(function (r) { return { date: r.date, stress_avg: r.stress_avg }; })) + "\n";
      msg += "elevated_stress_streak: " + hasElevatedStressStreak(recentRows) + "\n";
    }
    if (yesterdayRow && (yesterdayRow.evening_note || yesterdayRow.tomorrow_intention)) {
      if (yesterdayRow.evening_note) {
        msg += "yesterday_evening_note: " + JSON.stringify(yesterdayRow.evening_note) + "\n";
      }
      if (yesterdayRow.tomorrow_intention) {
        msg += "yesterday_tomorrow_intention: " + JSON.stringify(yesterdayRow.tomorrow_intention) + "\n";
      }
    }
    if (extraContext) {
      msg += "\nДодатковий контекст від користувача:\n" + extraContext + "\n";
    }
    return msg;
  }

  function renderBrief(brief) {
    setDot("dot-sleep", brief.sleep_status);
    setDot("dot-recovery", brief.recovery_status);
    setDot("dot-readiness", brief.readiness_status);
    el("brief-text").textContent = brief.summary;
    el("brief-text").classList.remove("skeleton");

    if (brief.clarifying_question) {
      el("question-text").textContent = brief.clarifying_question;
      el("question-box").classList.remove("hidden");
    } else {
      el("question-box").classList.add("hidden");
    }
  }

  el("answer-submit").addEventListener("click", async function () {
    const answer = el("question-answer").value.trim();
    if (!answer || !lastRow || !lastWeather) return;
    el("answer-submit").disabled = true;
    el("brief-text").textContent = "Оновлюю пораду...";
    el("brief-text").classList.add("skeleton");
    try {
      const extra = "Питання було: '" + (lastBrief.clarifying_question || "") +
        "'. Відповідь користувача: '" + answer + "'. Врахуй це у новій пораді.";
      const userMessage = buildUserMessage(lastRow, lastWeather, lastRecentRows, lastYesterdayRow, extra);
      const text = await callClaude(config, briefSystemPrompt(config), userMessage);
      lastBrief = extractJson(text);
      renderBrief(lastBrief);
      el("question-box").classList.add("hidden");
    } catch (e) {
      el("brief-text").textContent = "Помилка оновлення поради: " + e.message;
      el("brief-text").classList.remove("skeleton");
    } finally {
      el("answer-submit").disabled = false;
    }
  });

  el("details-toggle").addEventListener("click", function () {
    const card = el("details-card");
    const collapsed = card.classList.contains("hidden");
    card.classList.toggle("hidden");
    el("details-toggle").textContent = collapsed ? "Детальніше ▴" : "Детальніше ▾";
  });

  // ---------- Швидкий контекст ----------

  let activeTags = new Set();
  document.querySelectorAll(".chip").forEach(function (chip) {
    chip.addEventListener("click", function () {
      const tag = chip.getAttribute("data-tag");
      if (activeTags.has(tag)) {
        activeTags.delete(tag);
        chip.classList.remove("active");
      } else {
        activeTags.add(tag);
        chip.classList.add("active");
      }
    });
  });

  el("save-context-btn").addEventListener("click", async function () {
    const note = el("context-note").value.trim();
    const tags = Array.from(activeTags);
    if (!tags.length && !note) {
      el("context-msg").textContent = "Обери тег або напиши нотатку.";
      el("context-msg").className = "error-msg";
      return;
    }
    const contextText = tags.concat(note ? [note] : []).join("; ");
    el("save-context-btn").disabled = true;
    el("context-msg").textContent = "Зберігаю...";
    el("context-msg").className = "";

    try {
      await saveContextToNotion(contextText);
      el("context-msg").textContent = "Збережено в Notion.";
      el("context-msg").className = "saved-msg";
      el("context-note").value = "";
      activeTags.clear();
      document.querySelectorAll(".chip.active").forEach(function (c) { c.classList.remove("active"); });
    } catch (e) {
      el("context-msg").textContent = "Помилка: " + e.message;
      el("context-msg").className = "error-msg";
    } finally {
      el("save-context-btn").disabled = false;
    }
  });

  // ---------- Вечірня форма ----------

  let selectedMood = null;
  document.querySelectorAll(".mood-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      selectedMood = btn.getAttribute("data-mood");
      document.querySelectorAll(".mood-btn").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
    });
  });

  let selectedMovement = null;
  document.querySelectorAll(".movement-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      selectedMovement = btn.getAttribute("data-movement");
      document.querySelectorAll(".movement-btn").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
    });
  });

  el("save-evening-btn").addEventListener("click", async function () {
    if (!selectedMood) {
      el("evening-msg").textContent = "Обери оцінку дня (1-5).";
      el("evening-msg").className = "error-msg";
      return;
    }
    const moodNote = el("evening-mood-note").value.trim();
    const hardest = el("evening-hardest").value.trim();
    const tomorrow = el("evening-tomorrow").value.trim();
    const noteParts = [];
    if (moodNote) noteParts.push("Настрій: " + moodNote);
    if (hardest) noteParts.push("Найважче: " + hardest);

    el("save-evening-btn").disabled = true;
    el("evening-msg").textContent = "Зберігаю...";
    el("evening-msg").className = "";

    try {
      await saveEveningToNotion({
        mood: Number(selectedMood),
        note: noteParts.join(". "),
        movement: selectedMovement,
        tomorrowIntention: tomorrow
      });
      el("evening-msg").textContent = "Збережено в Notion.";
      el("evening-msg").className = "saved-msg";
    } catch (e) {
      el("evening-msg").textContent = "Помилка: " + e.message;
      el("evening-msg").className = "error-msg";
    } finally {
      el("save-evening-btn").disabled = false;
    }
  });

  // ---------- Ініціалізація ----------

  function renderGreetingDate() {
    el("greeting").textContent = "Привіт" + (config && config.name ? ", " + config.name : "") + "!";
    const now = new Date();
    el("today-date").textContent = now.toLocaleDateString("uk-UA", {
      weekday: "long", day: "numeric", month: "long"
    });
  }

  async function init() {
    renderGreetingDate();
    el("brief-text").textContent = "Аналізую дані...";
    el("brief-text").classList.add("skeleton");

    try {
      const [rows, current, yesterdayEvening] = await Promise.all([
        fetchRecentNotionRows(),
        getCurrentWeather(config.weatherKey),
        getYesterdayEveningWeather(config.weatherKey)
      ]);

      const row = rows[0];
      lastRow = row;
      lastRecentRows = rows;
      lastYesterdayRow = rows[1] || null;
      lastWeather = { current: current, yesterdayEvening: yesterdayEvening };
      renderDetails(row);

      const userMessage = buildUserMessage(row, lastWeather, lastRecentRows, lastYesterdayRow, null);
      const briefText = await callClaude(config, briefSystemPrompt(config), userMessage);
      lastBrief = extractJson(briefText);
      renderBrief(lastBrief);
    } catch (e) {
      el("brief-text").textContent = "Помилка завантаження: " + e.message;
      el("brief-text").classList.remove("skeleton");
    }
  }

  if (!config) {
    showOnboarding({});
  } else {
    init();
  }
})();
</script>

</body>
</html>
