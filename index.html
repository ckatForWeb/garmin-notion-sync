<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Health Briefing</title>
<style>
  :root {
    --bg: #0e0e10;
    --card: #1c1c1f;
    --card-alt: #26262a;
    --text: #f2f2f3;
    --muted: #9a9aa0;
    --border: #333338;
    --accent: #3b82f6;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 18px 80px;
    min-height: 100vh;
  }
  header.top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }
  header.top h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
  }
  header.top .date {
    font-size: 13px;
    color: var(--muted);
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
  }
  .statuses {
    display: flex;
    justify-content: space-around;
    text-align: center;
    margin-bottom: 8px;
  }
  .status {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .dot {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #ddd;
    transition: background 0.3s;
  }
  .dot.green { background: var(--green); }
  .dot.yellow { background: var(--yellow); }
  .dot.red { background: var(--red); }
  .status span {
    font-size: 12px;
    color: var(--muted);
  }
  .brief-text {
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .muted-text {
    color: var(--muted);
    font-size: 14px;
  }
  textarea, input[type=text], input[type=number] {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card-alt);
    color: var(--text);
  }
  textarea::placeholder, input::placeholder { color: var(--muted); }
  textarea { min-height: 64px; resize: vertical; }
  button.primary {
    width: 100%;
    padding: 12px;
    background: #fff;
    color: #111;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
  }
  button.primary:disabled { opacity: 0.5; cursor: default; }
  .details-toggle {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    padding: 4px 0;
  }
  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
    font-size: 13px;
  }
  .details-grid .item {
    background: var(--card-alt);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .details-grid .item .k { color: var(--muted); font-size: 11px; }
  .details-grid .item .v { font-weight: 700; font-size: 20px; margin-top: 4px; }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .chip {
    background: var(--card-alt);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .hidden { display: none !important; }
  .error-msg {
    color: var(--red);
    font-size: 13px;
    margin-top: 8px;
  }
  .saved-msg {
    color: var(--green);
    font-size: 13px;
    margin-top: 8px;
  }
  .segmented {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 18px;
  }
  .segmented button {
    flex: 1;
    border: none;
    background: none;
    padding: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
  }
  .segmented button.active {
    background: var(--card-alt);
    color: var(--text);
  }
  .mood-scale {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }
  .mood-btn {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card-alt);
    cursor: pointer;
    font-size: 15px;
    color: var(--text);
  }
  .mood-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .movement-options {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }
  .movement-btn {
    flex: 1;
    padding: 9px 0;
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card-alt);
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
  }
  .movement-btn.active {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div>
      <h1 id="greeting">Привіт, Юрій!</h1>
      <div class="date" id="today-date"></div>
    </div>
  </header>

  <div class="segmented">
    <button id="tab-morning">Ранок</button>
    <button id="tab-evening">Вечір</button>
  </div>

  <div id="morning-view">
    <div class="card">
      <div class="statuses">
        <div class="status">
          <div class="dot" id="dot-sleep"></div>
          <span>Сон</span>
        </div>
        <div class="status">
          <div class="dot" id="dot-recovery"></div>
          <span>Відновлення</span>
        </div>
        <div class="status">
          <div class="dot" id="dot-readiness"></div>
          <span>Готовність</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div id="morning-brief-text" class="brief-text muted-text">Завантажую...</div>
    </div>

    <button class="details-toggle" id="details-toggle">Детальніше ▾</button>
    <div class="card hidden" id="details-card">
      <div class="details-grid" id="details-grid"></div>
    </div>

    <div class="card">
      <div class="chips" id="context-chips">
        <div class="chip" data-tag="Тривога вночі">Тривога вночі</div>
        <div class="chip" data-tag="Важкий робочий день">Важкий робочий день</div>
        <div class="chip" data-tag="OPFOR виїзд">OPFOR виїзд</div>
      </div>
      <textarea id="context-note" placeholder="Додаткова нотатка (необов'язково)"></textarea>
      <button class="primary" id="save-context-btn">Зберегти контекст</button>
      <div id="context-msg"></div>
    </div>
  </div>

  <div id="evening-view" class="hidden">
    <div class="card">
      <div id="evening-brief-text" class="brief-text muted-text">Завантажую...</div>
    </div>

    <div class="card">
      <div class="field">
        <label>Як пройшов день емоційно?</label>
        <div class="mood-scale" id="mood-scale">
          <div class="mood-btn" data-mood="1">1</div>
          <div class="mood-btn" data-mood="2">2</div>
          <div class="mood-btn" data-mood="3">3</div>
          <div class="mood-btn" data-mood="4">4</div>
          <div class="mood-btn" data-mood="5">5</div>
        </div>
        <textarea id="evening-mood-note" placeholder="Коротко чому (необов'язково)"></textarea>
      </div>
      <div class="field">
        <label>Що було найважчим сьогодні?</label>
        <textarea id="evening-hardest" placeholder="..."></textarea>
      </div>
      <div class="field">
        <label>Чи рухався сьогодні?</label>
        <div class="movement-options" id="movement-options">
          <div class="movement-btn" data-movement="Так">Так</div>
          <div class="movement-btn" data-movement="Трохи">Трохи</div>
          <div class="movement-btn" data-movement="Ні">Ні</div>
        </div>
      </div>
      <div class="field">
        <label>Що хочеш від завтра?</label>
        <textarea id="evening-tomorrow" placeholder="..."></textarea>
      </div>
      <button class="primary" id="save-evening-btn">Зберегти вечір</button>
      <div id="evening-msg"></div>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // Проксі до Notion (тримає NOTION_TOKEN на сервері Netlify). Фронтенд тільки
  // читає вже готові Morning brief / Evening brief / статуси — сама генерація
  // відбувається заздалегідь у GitHub Actions (morning.py о 8:00, evening.py о 19:00).
  const NOTION_PROXY_URL = "https://fascinating-puppy-c11d90.netlify.app/.netlify/functions/notion";

  function el(id) { return document.getElementById(id); }

  // ---------- Перемикач Ранок / Вечір ----------

  function setTab(mode) {
    const isMorning = mode === "morning";
    el("tab-morning").classList.toggle("active", isMorning);
    el("tab-evening").classList.toggle("active", !isMorning);
    el("morning-view").classList.toggle("hidden", !isMorning);
    el("evening-view").classList.toggle("hidden", isMorning);
    el("greeting").textContent = isMorning ? "Доброго ранку, Юрію" : "Як пройшов день?";
  }

  el("tab-morning").addEventListener("click", function () { setTab("morning"); });
  el("tab-evening").addEventListener("click", function () { setTab("evening"); });

  // ---------- Notion (через Netlify-проксі) ----------

  async function fetchTodayRow() {
    const resp = await fetch(NOTION_PROXY_URL);
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error("Notion proxy " + resp.status + ": " + text.slice(0, 300));
    }
    return resp.json();
  }

  async function saveContextToNotion(contextText) {
    const resp = await fetch(NOTION_PROXY_URL, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ type: "context", contextText: contextText })
    });
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error("Notion proxy " + resp.status + ": " + text.slice(0, 300));
    }
  }

  async function saveEveningToNotion(payload) {
    const resp = await fetch(NOTION_PROXY_URL, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(Object.assign({ type: "evening" }, payload))
    });
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error("Notion proxy " + resp.status + ": " + text.slice(0, 300));
    }
  }

  // ---------- Рендер ----------

  const STATUS_COLORS = ["green", "yellow", "red"];

  function setDot(id, color) {
    const node = el(id);
    STATUS_COLORS.forEach(function (c) { node.classList.remove(c); });
    if (STATUS_COLORS.indexOf(color) !== -1) {
      node.classList.add(color);
    }
  }

  function renderDetails(row) {
    const items = [
      ["Сон", row.sleep_score, row.sleep_hours != null ? (row.sleep_hours + " год") : null],
      ["HRV", row.hrv_avg, row.hrv_status || null],
      ["Body battery", (row.body_battery_low != null && row.body_battery_high != null)
        ? (row.body_battery_low + "–" + row.body_battery_high) : null, "мін → макс"],
      ["Пульс спокою", row.resting_hr, "уд/хв"],
      ["Глибокий сон, хв", row.deep_sleep_min, null],
      ["REM сон, хв", row.rem_sleep_min, null],
      ["Легкий сон, хв", row.light_sleep_min, null],
      ["SpO2 avg", row.spo2_avg, null],
      ["Стрес", row.stress_avg, null],
      ["Кроки", row.steps, null],
      ["Тренування", row.activities || "—", null]
    ];
    const grid = el("details-grid");
    grid.innerHTML = "";
    items.forEach(function (item) {
      const div = document.createElement("div");
      div.className = "item";
      const value = item[1] != null && item[1] !== "" ? item[1] : "—";
      const caption = item[2] ? '<div class="k">' + item[2] + "</div>" : "";
      div.innerHTML = '<div class="k">' + item[0] + '</div><div class="v">' + value + "</div>" + caption;
      grid.appendChild(div);
    });
  }

  function renderMorning(row) {
    if (row.sleep_status) setDot("dot-sleep", row.sleep_status);
    if (row.recovery_status) setDot("dot-recovery", row.recovery_status);
    if (row.readiness_status) setDot("dot-readiness", row.readiness_status);

    const briefEl = el("morning-brief-text");
    if (row.morning_brief) {
      briefEl.textContent = row.morning_brief;
      briefEl.classList.remove("muted-text");
    } else {
      briefEl.textContent = "Ранковий брифінг ще не згенеровано — з'явиться о 8:00.";
      briefEl.classList.add("muted-text");
    }

    renderDetails(row);
  }

  function renderEvening(row) {
    const briefEl = el("evening-brief-text");
    if (row.evening_brief) {
      briefEl.textContent = row.evening_brief;
      briefEl.classList.remove("muted-text");
    } else {
      briefEl.textContent = "Вечірній підсумок з'явиться о 19:00.";
      briefEl.classList.add("muted-text");
    }
  }

  // ---------- Швидкий контекст (ранок) ----------

  let activeTags = new Set();
  document.querySelectorAll(".chip").forEach(function (chip) {
    chip.addEventListener("click", function () {
      const tag = chip.getAttribute("data-tag");
      if (activeTags.has(tag)) {
        activeTags.delete(tag);
        chip.classList.remove("active");
      } else {
        activeTags.add(tag);
        chip.classList.add("active");
      }
    });
  });

  el("save-context-btn").addEventListener("click", async function () {
    const note = el("context-note").value.trim();
    const tags = Array.from(activeTags);
    if (!tags.length && !note) {
      el("context-msg").textContent = "Обери тег або напиши нотатку.";
      el("context-msg").className = "error-msg";
      return;
    }
    const contextText = tags.concat(note ? [note] : []).join("; ");
    el("save-context-btn").disabled = true;
    el("context-msg").textContent = "Зберігаю...";
    el("context-msg").className = "";

    try {
      await saveContextToNotion(contextText);
      el("context-msg").textContent = "Збережено в Notion.";
      el("context-msg").className = "saved-msg";
      el("context-note").value = "";
      activeTags.clear();
      document.querySelectorAll(".chip.active").forEach(function (c) { c.classList.remove("active"); });
    } catch (e) {
      el("context-msg").textContent = "Помилка: " + e.message;
      el("context-msg").className = "error-msg";
    } finally {
      el("save-context-btn").disabled = false;
    }
  });

  // ---------- Вечірня форма рефлексії ----------

  let selectedMood = null;
  document.querySelectorAll(".mood-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      selectedMood = btn.getAttribute("data-mood");
      document.querySelectorAll(".mood-btn").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
    });
  });

  let selectedMovement = null;
  document.querySelectorAll(".movement-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      selectedMovement = btn.getAttribute("data-movement");
      document.querySelectorAll(".movement-btn").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
    });
  });

  el("save-evening-btn").addEventListener("click", async function () {
    if (!selectedMood) {
      el("evening-msg").textContent = "Обери оцінку дня (1-5).";
      el("evening-msg").className = "error-msg";
      return;
    }
    const moodNote = el("evening-mood-note").value.trim();
    const hardest = el("evening-hardest").value.trim();
    const tomorrow = el("evening-tomorrow").value.trim();
    const noteParts = [];
    if (moodNote) noteParts.push("Настрій: " + moodNote);
    if (hardest) noteParts.push("Найважче: " + hardest);

    el("save-evening-btn").disabled = true;
    el("evening-msg").textContent = "Зберігаю...";
    el("evening-msg").className = "";

    try {
      await saveEveningToNotion({
        mood: Number(selectedMood),
        note: noteParts.join(". "),
        movement: selectedMovement,
        tomorrowIntention: tomorrow
      });
      el("evening-msg").textContent = "Збережено в Notion.";
      el("evening-msg").className = "saved-msg";
    } catch (e) {
      el("evening-msg").textContent = "Помилка: " + e.message;
      el("evening-msg").className = "error-msg";
    } finally {
      el("save-evening-btn").disabled = false;
    }
  });

  el("details-toggle").addEventListener("click", function () {
    const card = el("details-card");
    const collapsed = card.classList.contains("hidden");
    card.classList.toggle("hidden");
    el("details-toggle").textContent = collapsed ? "Детальніше ▴" : "Детальніше ▾";
  });

  // ---------- Ініціалізація ----------

  function renderGreetingDate() {
    const now = new Date();
    el("today-date").textContent = now.toLocaleDateString("uk-UA", {
      weekday: "long", day: "numeric", month: "long"
    });
  }

  async function init() {
    renderGreetingDate();
    setTab(new Date().getHours() < 15 ? "morning" : "evening");

    try {
      const row = await fetchTodayRow();
      renderMorning(row);
      renderEvening(row);
    } catch (e) {
      const message = "Помилка завантаження: " + e.message;
      el("morning-brief-text").textContent = message;
      el("evening-brief-text").textContent = message;
    }
  }

  init();
})();
</script>

</body>
</html>
