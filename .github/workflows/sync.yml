name: Garmin -> Notion sync

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      days_back:
        description: "Скільки днів історії підтягнути (порожньо = тільки вчора)"
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install garminconnect requests

      - name: Run sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DAYS_BACK: ${{ github.event.inputs.days_back }}
        run: |
          if [ -n "$DAYS_BACK" ]; then
            python sync.py --days-back "$DAYS_BACK"
          else
            python sync.py
          fi
